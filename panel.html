<!DOCTYPE html>
<html lang="tr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Kamera + Komut Paneli</title>

<script>
// Firebase ayarları
var firebaseConfig = {
    databaseURL: "https://arabotbase1-default-rtdb.firebaseio.com/"
};
firebase.initializeApp(firebaseConfig);

// Komut gönder
function sendCommand(cmd){
    firebase.database().ref("komut").set(cmd);
    document.getElementById("status").innerHTML = "Gönderildi: " + cmd;
}
</script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0d1117;
  color: white;
  margin: 0;
  padding: 10px;
  text-align: center;
}

h2 {
  font-size: 22px;
  margin-bottom: 10px;
}

/* Kamera görüntüsü kutusu */
#cameraBox {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  background: black;
  border-radius: 10px;
  overflow: hidden;
}

#cameraView {
  width: 100%;
  height: auto;
}

/* Buton grid */
.btn-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-top: 20px;
}

/* Mobil uyumlu buton */
button {
  padding: 16px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #238636;
  color: white;
  box-shadow: 0 3px 6px rgba(0,0,0,0.4);
}

button:active {
  background: #1c6d2a;
  transform: scale(0.97);
}

#status {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>

</head>

<body>

<h2>📡IP Kamera + OTG Komut Paneli</h2>

<!-- Kamera görüntüsü -->
<div id="cameraBox">
  http://192.168.1.8:8080/video
</div>
<img src="http://192.168.1.8:8080/video" width="640" height="480" />
    
<!-- Komut butonları -->
<div class="btn-container">
  <button onclick="sendCommand('led_on')">LED Aç</button>
  <button onclick="sendCommand('led_off')">LED Kapat</button>
  <button onclick="sendCommand('motor_start')">Motor Başlat</button>
  <button onclick="sendCommand('motor_stop')">Motor Durdur</button>
  <button onclick="sendCommand('reload_cam')">Kamerayı Yenile</button>
  <button onclick="sendCommand('reset')">Cihaz Reset</button>
</div>

<p id="status">Komut bekleniyor...</p>

</body>
</html>
