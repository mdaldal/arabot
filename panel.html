<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Firebase Update Sample</title>

    <script type="module">
        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

        import { getDatabase, ref, update }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- Firebase Config (kendi değerlerini koy) ---
        const firebaseConfig = {
            apiKey: "API_KEY",
            databaseURL: "https://arabotbase1-default-rtdb.firebaseio.com",
        };

        // Firebase başlat
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // -----------------------------
        //   KOLON GÜNCELLEME FONKSİYONU
        // -----------------------------
        function updateColumn(cmd) {
  
            const userRef = ref(db);

            update(userRef,
                {
                    Komut: cmd
                }
            )
                .catch(err => console.error("Hata:", err));
            document.getElementById("status").innerHTML = "Gönderildi: " + cmd;
        }

        window.updateColumn = updateColumn;
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: white;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        h2 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        /* Kamera görüntüsü kutusu */
        #cameraBox {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: black;
            border-radius: 10px;
            overflow: hidden;
        }

        #cameraView {
            width: 100%;
            height: auto;
        }

        /* Buton grid */
        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        /* Mobil uyumlu buton */
        button {
            padding: 16px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #238636;
            color: white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }

            button:active {
                background: #1c6d2a;
                transform: scale(0.97);
            }

        #status {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h2>IP Kamera + OTG Komut Paneli</h2>

    <!-- Kamera görüntüsü -->
    <div id="cameraBox">
        http://192.168.1.6:8080/shot
    </div>

    <img id="cam" src="" width="640" height="480">

    <script>

        function getImage() {
            setInterval(() => {

                document.getElementById('cam').src = "http://192.168.1.6:8080/shot.jpg?t=" + new Date().getTime();
            }, 1000); // 1000 = 1 saniyede bir yenile
        }

        function stopImage() {


            document.getElementById('cam').src = "";


        }
        
        
    </script>
    <!-- Komut butonları -->
    <div class="btn-container">
        <button onclick="updateColumn('led_on')">LED Aç</button>
        <button onclick="updateColumn('led_off')">LED Kapat</button>
        <button onclick="updateColumn('motor_start')">Motor Başlat</button>
        <button onclick="updateColumn('motor_stop')">Motor Durdur</button>
        <button onclick="getImage()">Get Image</button>
        <button onclick="stopImage()">Stop Image</button>
    </div>

    <p id="status">Komut bekleniyor...</p>
</body>
</html>
